# secrets_vault/v1 — encrypted credential store (local, gitignored)
#
# Path: agentic/hermes/.kb/private/secrets/vault.json
# NEVER scanned by kb-scan / kb-extract / RAG (see paths.SECRETS_DIR_NAME).
#
# Unlock: CAREER_VAULT_PASSPHRASE env or interactive prompt (manage.py secrets).
# Agents (CKM, researcher, coach) must NOT read the vault — only thin adapters.

schema: secrets_vault/v1
storage: json_file
path: agentic/hermes/.kb/private/secrets/vault.json

encryption:
  kdf: pbkdf2-sha256
  kdf_iterations: 600000
  cipher: aes-256-gcm
  key_length_bytes: 32

entry_key_pattern: "^[a-z][a-z0-9_]{1,47}$"   # e.g. gmail_oauth, yahoo_imap

entry_types:
  oauth_gmail:
    description: Gmail API OAuth token bundle (refresh_token required)
    fields:
      client_id: string
      client_secret: string
      refresh_token: string
      token_uri: string          # default https://oauth2.googleapis.com/token
      scopes: list[string]
    notes: Prefer OAuth over IMAP password for Gmail.

  oauth_outlook:
    description: Microsoft Graph / Outlook OAuth token bundle
    fields:
      client_id: string
      client_secret: string
      tenant_id: string          # common | organizations | <guid>
      refresh_token: string
      scopes: list[string]

  imap_app_password:
    description: IMAP with app-specific password (Yahoo, legacy providers)
    fields:
      host: string               # e.g. imap.mail.yahoo.com
      port: integer              # default 993
      username: string
      password: string           # app password, not account password
      use_ssl: boolean           # default true
      mailbox: string            # default INBOX

  linkedin_session:
    description: Short-lived logged-in session (cookies only — no password storage)
    fields:
      li_at: string              # LinkedIn session cookie value
      expires_at: string         # ISO8601 — rotate before this
      user_agent: string
    notes: High maintenance; guest JobSpy preferred for DISCOVER.

  proxy_list:
    description: Optional HTTP/SOCKS proxies for aggregator fetchers
    fields:
      proxies: list[string]      # host:port or user:pass@host:port

outer_file_shape:
  schema: secrets_vault/v1
  created_at: ISO8601 UTC
  updated_at: ISO8601 UTC
  kdf:
    name: pbkdf2-sha256
    salt: base64
    iterations: integer
  entries:
    "<entry_key>":
      type: "<entry_type>"
      updated_at: ISO8601 UTC
      nonce: base64
      ciphertext: base64        # AES-GCM encrypts JSON payload of type fields

access_rules:
  - Vault directory excluded from kb-scan and Chroma indexing
  - manage.py secrets list shows keys + types only — never values
  - Decrypted payloads must not appear in logs, prompts, or learning_events
  - Rotate passphrase by re-encrypting vault (future: secrets rekey command)

related:
  - docs/rfc/secrets_and_email_intake.md
  - lib/kb/secrets_vault.py
  - lib/career/email_intake.py
